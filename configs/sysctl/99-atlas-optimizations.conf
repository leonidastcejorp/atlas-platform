# ATLAS PLATFORM — Memory & Filesystem Optimizations
# /etc/sysctl.d/99-atlas-optimizations.conf

# Swappiness — prefer RAM over swap
vm.swappiness = 10

# VFS cache pressure — keep dentry/inode caches
vm.vfs_cache_pressure = 50

# Dirty page ratio — write back more aggressively
vm.dirty_ratio = 15
vm.dirty_background_ratio = 5

# Overcommit memory (allow for larger allocations)
vm.overcommit_memory = 1
vm.overcommit_ratio = 50

# Inotify watchers (for automation tools)
fs.inotify.max_user_watches = 524288
fs.inotify.max_user_instances = 512

# File handles
fs.file-max = 2097152
fs.nr_open = 2097152

# AIO requests
fs.aio-max-nr = 1048576

# Increase PID limit
kernel.pid_max = 4194304

# Increase max map count (for Chrome/Playwright)
vm.max_map_count = 262144
