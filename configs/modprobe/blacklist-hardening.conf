# ATLAS PLATFORM — Kernel Module Blacklist
# /etc/modprobe.d/atlas-blacklist-hardening.conf
# Prevents loading of rarely-needed but exploitable modules

# Disable uncommon filesystems
install cramfs /bin/true
install freevxfs /bin/true
install jffs2 /bin/true
install hfs /bin/true
install hfsplus /bin/true
install squashfs /bin/true
install udf /bin/true
install fat /bin/true
install vfat /bin/true

# Disable uncommon network protocols
install dccp /bin/true
install sctp /bin/true
install rds /bin/true
install tipc /bin/true

# Disable USB storage (uncomment if server doesn't need USB drives)
# install usb-storage /bin/true

# Disable Firewire
install firewire-core /bin/true
install ieee1394 /bin/true
